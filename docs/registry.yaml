# docs/registry.yaml — Zentinelle Knowledge System Registry
#
# Source of truth for all knowledge documents in this repo.
# Run `python scripts/kf.py docs` to regenerate BOOTSTRAP-PRIMER sections
# in CLAUDE.md, agents.md, and gemini.md from this file.
#
# Fields:
#   path        - path relative to repo root
#   role        - one-line description of what this file is for
#   read_when   - when an agent should read this file
#   agents      - which agent shims should include this in their primer
#   internal    - true = gitignored, do not reference in public docs

version: "1.0"

knowledge_files:

  - path: bootstrap.md
    role: "Canonical technical reference — architecture, models, commands, naming"
    read_when: "Always, before any work"
    agents: [claude, gemini, cursor, windsurf, codex]

  - path: memory.md
    role: "Project decisions, milestones, open questions"
    read_when: "Always, before any work"
    agents: [claude, gemini, cursor]

  - path: docs/wiki/architecture.md
    role: "Deep architecture: DB routing, auth flows, policy engine internals"
    read_when: "Major architectural changes"
    agents: [claude, gemini, cursor]

  - path: docs/wiki/api.md
    role: "REST API reference — all agent-facing endpoints"
    read_when: "REST API changes"
    agents: [claude, gemini, cursor, windsurf]

  - path: docs/wiki/policies.md
    role: "Policy type catalogue and evaluation logic"
    read_when: "Policy engine changes"
    agents: [claude, gemini, cursor]

  - path: docs/wiki/compliance.md
    role: "Compliance framework mappings (SOC2, GDPR, HIPAA, EU AI Act, NIST)"
    read_when: "Compliance feature changes"
    agents: [claude, gemini, cursor]

  - path: docs/wiki/sdk.md
    role: "SDK integration guide"
    read_when: "SDK-related work"
    agents: [claude, gemini, cursor, windsurf, codex]

  - path: docs/wiki/deployment.md
    role: "Deployment guide — Docker, env vars, scaling"
    read_when: "Infra/deployment changes"
    agents: [claude, gemini]

  - path: docs/wiki/development.md
    role: "Development setup and contribution guide"
    read_when: "Onboarding, dev environment"
    agents: [claude, gemini, cursor, windsurf, codex]

  - path: docs/pricing.yaml
    role: "Pricing tier definitions — source of truth for billing config"
    read_when: "Pricing or billing changes"
    agents: [claude, gemini]

  - path: calliope.md
    role: "Internal Calliope deployment wiring — managed hosting, env vars, internal URLs"
    read_when: "Calliope-internal deployment work"
    agents: [claude, gemini]
    internal: true

primer_targets:
  # Files that receive a generated BOOTSTRAP-PRIMER section.
  # The section is bounded by BEGIN/END markers and regenerated by `kf docs`.

  - file: CLAUDE.md
    section: BOOTSTRAP-PRIMER
    agents: [claude]

  - file: agents.md
    section: BOOTSTRAP-PRIMER
    agents: [cursor, windsurf, codex]

  - file: gemini.md
    section: BOOTSTRAP-PRIMER
    agents: [gemini]

skills:
  # Agent skill files — task-specific workflow guides with safety checkpoints.
  # Listed here for discoverability; kf does not regenerate these.

  - path: .claude/skills/backend-changes.md
    title: "Backend Changes"
    use_when: "Any Python/Django changes"

  - path: .claude/skills/graphql-schema.md
    title: "GraphQL Schema Changes"
    use_when: "Modifying types, queries, or mutations"

  - path: .claude/skills/issue-workflow.md
    title: "Issue Workflow"
    use_when: "Working on a GitHub issue"

  - path: .claude/skills/policy-impact.md
    title: "Policy Engine Changes"
    use_when: "Changing policy engine or evaluation logic"
