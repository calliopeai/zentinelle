  primaryContactEmail: String!
  primaryContactPhone: String!
  website: String!

  """Regions partner operates in"""
  regions: JSONString!

  """Industry verticals partner focuses on"""
  verticals: JSONString!
  payoutMethod: BillingPartnerPayoutMethodChoices!

