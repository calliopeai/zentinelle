"""
Start onboarding from a completed Stripe checkout session.

This is called after the user completes payment on Stripe Checkout.
It looks up the PendingCheckout record (created by webhook) and
creates the organization + onboarding, then claims the checkout.

Flow:
1. User pays via Stripe Checkout
2. Webhook creates PendingCheckout record
3. User lands on /onboarding?session_id=xxx
4. Frontend calls this mutation
5. We create org, claim PendingCheckout, create Entitlement
6. Entitlement triggers provisioning when activated
"""
