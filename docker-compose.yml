services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DEBUG=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-zentinelle}
      - POSTGRES_USER=${POSTGRES_USER:-zentinelle}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ZENTINELLE_BOOTSTRAP_SECRET=${ZENTINELLE_BOOTSTRAP_SECRET:-dev-bootstrap-secret}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python manage.py migrate --database default --no-input &&
        python manage.py migrate --database zentinelle --no-input &&
        python manage.py migrate --database analytics --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 60
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/zentinelle/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-zentinelle}
      - POSTGRES_USER=${POSTGRES_USER:-zentinelle}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-zentinelle}
      - POSTGRES_USER=${POSTGRES_USER:-zentinelle}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config beat -l info

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      - ZENTINELLE_URL=http://backend:8000
      - GATEWAY_PORT=8742
      - FAIL_OPEN=true
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8742:8742"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - NEXT_PUBLIC_GQL_URL=http://localhost:8080/gql/zentinelle/
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/zentinelle/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --port 3000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zentinelle}
      POSTGRES_USER: ${POSTGRES_USER:-zentinelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zentinelle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zentinelle}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ClickHouse — optional, for high-volume analytics
  # Enable with: docker compose --profile analytics up
  clickhouse:
    profiles: ["analytics"]
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/zentinelle/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
