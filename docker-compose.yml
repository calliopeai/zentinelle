services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zentinelle}:${POSTGRES_PASSWORD:-zentinelle}@postgres:5432/${POSTGRES_DB:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CLICKHOUSE_URL=clickhouse://default:@clickhouse:8123/default
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - clickhouse
    volumes:
      - ./backend:/app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 60

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zentinelle}:${POSTGRES_PASSWORD:-zentinelle}@postgres:5432/${POSTGRES_DB:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CLICKHOUSE_URL=clickhouse://default:@clickhouse:8123/default
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - clickhouse
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zentinelle}:${POSTGRES_PASSWORD:-zentinelle}@postgres:5432/${POSTGRES_DB:-zentinelle}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CLICKHOUSE_URL=clickhouse://default:@clickhouse:8123/default
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - clickhouse
    volumes:
      - ./backend:/app
    command: celery -A config beat -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zentinelle}
      POSTGRES_USER: ${POSTGRES_USER:-zentinelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zentinelle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/zentinelle/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
